<article class="account-card">
  <a
    class="manage-button top-button"
    [routerLink]="['/accounts', account.id, 'transactions']"
  >
    View transactions
  </a>

  <div class="card-header">
    <div>
      <h3>{{ account.owner_name }}</h3>
      <p><strong>Account ID</strong>: {{ account.id }}</p>
    </div>
  </div>

  <p><strong>Balance</strong>: {{ balance | number:'1.2-2' }} {{ account.currency }}</p>
  <button
    *ngIf="canConvert"
    class="manage-button convert-button"
    type="button"
    (click)="convertBalance()"
    [disabled]="isConverting()"
  >
    {{ isConverting() ? 'Converting...' : 'Convert to USD' }}
  </button>
  <p *ngIf="convertedBalance()" class="converted-balance">
    {{ convertedBalance() }}
  </p>

  <p><strong>Currency</strong>: {{ account.currency }}</p>
  <p><strong>Opened</strong>: {{ account.created_at | date:'longDate' }}</p>
</article>
