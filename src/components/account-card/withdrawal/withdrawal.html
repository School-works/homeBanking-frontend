<div class="operation-page">
  <div class="op-header">
    <a [routerLink]="['/']" class="back-link">← Torna ai conti</a>
    <h2>➖ Registra prelievo</h2>
    <p class="op-subtitle" *ngIf="account">{{ account.owner_name }} — ID {{ account.id }}</p>
  </div>

  <div class="op-form">
    <p *ngIf="error" class="form-error">{{ error }}</p>
    <p *ngIf="success" class="form-success">{{ success }}</p>

    <label>
      Importo ({{ account?.currency }})
      <input type="number" min="0.01" step="0.01" [(ngModel)]="amount" placeholder="0.00" />
    </label>

    <label>
      Descrizione
      <input type="text" [(ngModel)]="description" placeholder="es. Affitto, Bolletta…" />
    </label>

    <button class="submit-btn withdrawal-btn" type="button" (click)="submit()" [disabled]="submitting">
      {{ submitting ? 'Salvataggio…' : 'Conferma prelievo' }}
    </button>
  </div>
</div>
